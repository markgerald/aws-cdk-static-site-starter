name: CI

on:
  pull_request:
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'test/**'
      - 'website_src/**'
      - '!**/*.md'

jobs:
  validate:
    name: Build, test and synth
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build demo website
        run: npm run build:site

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Synthesize CDK templates
        run: npx cdk synth
